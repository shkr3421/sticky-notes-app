spring.application.name=stickyNotesAPI

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://fallback-url}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fallback_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fallback_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${PORT:8080}