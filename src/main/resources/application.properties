spring.application.name=stickyNotesAPI

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-tight-frog-adjkgk8z-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
