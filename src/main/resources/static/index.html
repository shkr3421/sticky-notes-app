<!DOCTYPE html>
<html>
<head>
    <title>Sticky Notes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #007bff;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        .notes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: red;
            padding: 5px 8px;
            font-size: 12px;
        }

        .actions {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Sticky Notes</h1>

    <div class="input-box">
        <input id="noteInput" placeholder="Enter your note..." />
        <button onclick="addNote()">Add</button>
    </div>

    <div class="actions">
        <button onclick="fetchNotes()">View All</button>
        <button onclick="clearUI()">Clear UI</button>
    </div>

    <div id="notes" class="notes"></div>
</div>

<script>
const API = "https://sticky-notes-app-production-e057.up.railway.app/notes";

async function fetchNotes() {
    const res = await fetch(API);
    const data = await res.json();

    const container = document.getElementById("notes");
    container.innerHTML = "";

    data.forEach(note => {
        const card = document.createElement("div");
        card.className = "card";

        const text = document.createElement("p");
        text.innerText = note.content;

        const del = document.createElement("button");
        del.innerText = "X";
        del.className = "delete-btn";
        del.onclick = () => deleteNote(note.id);

        card.appendChild(text);
        card.appendChild(del);

        container.appendChild(card);
    });
}

async function addNote() {
    const input = document.getElementById("noteInput");
    const content = input.value;

    if (!content) return alert("Enter something!");

    await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content })
    });

    input.value = "";
    fetchNotes();
}

async function deleteNote(id) {
    await fetch(`${API}/${id}`, {
        method: "DELETE"
    });

    fetchNotes();
}

function clearUI() {
    document.getElementById("notes").innerHTML = "";
}

// Auto refresh every 5 min
setInterval(fetchNotes, 300000);

</script>

</body>
</html>
